schema_version: 1

context:
  version: "2.22.0"
  python_min: "3.12"

package:
  name: mistral-vibe
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/m/mistral-vibe/mistral_vibe-${{ version }}.tar.gz
    sha256: 81554fbb39ddc92120c7735aabe47dcd8691b6467b449d6331455b6461fa2e3d
    patches:
      - 0001-Relax-constraints-on-dependencies.patch

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check
  python:
    entry_points:
      - vibe = vibe.cli.entrypoint:main
      - vibe-acp = vibe.acp.entrypoint:main

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling =1.31.0
    - pip
  run:
    - agent-client-protocol ==0.11.0
    - annotated-types ==0.7.0
    - anyio ==4.14.1
    - attrs ==26.1.0
    - beautifulsoup4 ==4.14.3
    - cachetools ==7.0.6
    - certifi ==2026.6.17
    - cffi ==2.0.0
    - charset-normalizer ==3.4.7
    - click ==8.3.3
    - colorama ==0.4.6
    - cryptography ==48.0.1
    - eval-type-backport ==0.3.1
    - gitdb ==4.0.12
    - gitpython ==3.1.51
    - giturlparse ==0.15.0
    - google-auth ==2.49.2
    - googleapis-common-protos ==1.74.0
    - h11 ==0.16.0
    - httpcore ==1.0.9
    - httpx ==0.28.1
    - httpx-sse ==0.4.3
    - humanize ==4.16.0
    - idna ==3.18
    - importlib-metadata ==8.7.1
    # - jaraco-classes ==3.4.0
    # - jaraco-context ==6.1.2
    - jaraco.functools ==4.4.0
    - jeepney ==0.9.0
    - jsonpatch ==1.33
    - jsonpath-python ==1.1.5
    - jsonpointer ==3.1.1
    - jsonschema ==4.26.0
    - jsonschema-specifications ==2025.9.1
