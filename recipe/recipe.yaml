schema_version: 1

context:
  version: "2.8.1"
  python_min: "3.12"

package:
  name: mistral-vibe
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/m/mistral-vibe/mistral_vibe-${{ version }}.tar.gz
    sha256: dbd07840525a940cffe661f177d1d743f43335f0e4f4fcb930e26d22c1018f26

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check
  python:
    entry_points:
      - vibe = vibe.cli.entrypoint:main
      - vibe-acp = vibe.acp.entrypoint:main

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - agent-client-protocol =0.9.0
    - anyio >=4.12.0
    - cachetools >=5.5.0
    - charset-normalizer >=3.4.4
    - cryptography >=44.0.0,<=46.0.3
    - gitpython >=3.1.46
    - giturlparse >=0.14.0
    - google-auth >=2.0.0
    - httpx >=0.28.1
    - jsonpatch >=1.33
    - keyring >=25.6.0
    - markdownify >=1.2.2
    - mcp >=1.14.0
    - mistralai =2.3.2
    - opentelemetry-api >=1.39.1
    - opentelemetry-exporter-otlp-proto-http >=1.39.1
    - opentelemetry-sdk >=1.39.1
    - opentelemetry-semantic-conventions >=0.60b1
    - packaging >=24.1
    - pexpect >=4.9.0
    - pydantic >=2.12.4
    - pydantic-settings >=2.12.0
    - pyperclip >=1.11.0
    - python-dotenv >=1.0.0
    - pyyaml >=6.0.0
    - requests >=2.20.0
    - rich >=14.0.0
    - python-sounddevice >=0.5.1
    - textual >=8.2.1
    - textual-speedups >=0.2.1
    - tomli-w >=1.2.0
    - tree_sitter >=0.25.2
    - tree-sitter-bash >=0.25.1
    - watchfiles >=1.1.1
    - websockets >=13.0
    - zstandard >=0.25.0

tests:
  - python:
      imports:
        - vibe
      pip_check: true
      python_version: ${{ python_min }}.*
  - script:
      - vibe --help

about:
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/mistralai/mistral-vibe
  summary: Minimal CLI coding agent by Mistral.

extra:
  recipe-maintainers:
    - davidbrochart
