schema_version: 1

context:
  version: "2.10.0"
  python_min: "3.12"

package:
  name: mistral-vibe
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/m/mistral-vibe/mistral_vibe-${{ version }}.tar.gz
    sha256: d4be6cc0a899a6df84d506834e44ba8cab835a9543151504cbe3cd6132a86c88

build:
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check
  python:
    entry_points:
      - vibe = vibe.cli.entrypoint:main
      - vibe-acp = vibe.acp.entrypoint:main

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - agent-client-protocol =0.9.0
    - annotated-types =0.7.0
    - anyio =4.13.0
    - attrs =26.1.0
    - beautifulsoup4 =4.14.3
    - cachetools =7.0.6
    - certifi =2026.4.22
    - cffi =2.0.0
    - charset-normalizer =3.4.7
    - click =8.3.3
    - if: win
      then:
        - colorama =0.4.6
    - cryptography =47.0.0
    - eval-type-backport =0.3.1
    - gitdb =4.0.12
    - gitpython =3.1.47
    - giturlparse =0.14.0
    - google-auth =2.49.2
    - googleapis-common-protos =1.74.0
    - h11 =0.16.0
    - httpcore =1.0.9
    - httpx =0.28.1
    - httpx-sse =0.4.3
    - idna =3.13
    - importlib-metadata =8.7.1
    - jaraco-classes =3.4.0
    - jaraco-context =6.1.2
    - jaraco-functools =4.4.0
    - if: linux
      then:
        - jeepney =0.9.0
    - jsonpatch =1.33
    - jsonpath-python =1.1.5
    - jsonpointer =3.1.1
    - jsonschema =4.26.0
    - jsonschema-specifications =2025.9.1
    - keyring =25.7.0
    - linkify-it-py =2.1.0
    - markdown-it-py =4.0.0
    - markdownify =1.2.2
    - mcp =1.27.0
    - mdit-py-plugins =0.5.0
    - mdurl =0.1.2
    - mistralai =2.4.4
    - more-itertools =11.0.2
    - opentelemetry-api =1.39.1
    - opentelemetry-exporter-otlp-proto-common =1.39.1
    - opentelemetry-exporter-otlp-proto-http =1.39.1
    - opentelemetry-proto =1.39.1
    - opentelemetry-sdk =1.39.1
    - opentelemetry-semantic-conventions =0.60b1
    - packaging =26.2
    - pexpect =4.9.0
    - platformdirs =4.9.6
    - protobuf =6.33.6
    - ptyprocess =0.7.0
    - pyasn1 =0.6.3
    - pyasn1-modules =0.4.2
    - pycparser =3.0
    - pydantic =2.13.3
    - pydantic-core =2.46.3
    - pydantic-settings =2.14.0
    - pygments =2.20.0
    - pyjwt =2.12.1
    - pyperclip =1.11.0
    - python-dateutil =2.9.0.post0
    - python-dotenv =1.2.2
    - python-multipart =0.0.27
    - python-sounddevice =0.5.5
    - if: win
      then:
        - pywin32 =311
        - pywin32-ctypes =0.2.3
    - pyyaml =6.0.3
    - referencing =0.37.0
    - requests =2.33.1
    - rich =15.0.0
    - rpds-py =0.30.0
    - if: linux
      then:
        - secretstorage =3.5.0
    - six =1.17.0
    - smmap =5.0.3
    - soupsieve =2.8.3
    - sse-starlette =3.4.1
    - starlette =1.0.0
    - textual =8.2.4
    - textual-speedups =0.2.1
    - tomli-w =1.2.0
    - tree_sitter =0.25.2
    - tree-sitter-bash =0.25.1
    - typing-extensions =4.15.0
    - typing-inspection =0.4.2
    - uc-micro-py =2.0.0
    - urllib3 =2.6.3
    - uvicorn =0.46.0
    - watchfiles =1.1.1
    - websockets =16.0
    - zipp =3.23.1
    - zstandard =0.25.0

tests:
  - python:
      imports:
        - vibe
      pip_check: true
      python_version: ${{ python_min }}.*
  - script:
      - vibe --help

about:
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/mistralai/mistral-vibe
  summary: Minimal CLI coding agent by Mistral.

extra:
  recipe-maintainers:
    - davidbrochart
