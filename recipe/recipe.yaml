tests:
  - python:
      imports:
        - vibe
      pip_check: true
      python_version: ${{ python_min }}.*
  - script:
      - vibe --help

about:
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/mistralai/mistral-vibe
  summary: Minimal CLI coding agent by Mistral.

extra:
  recipe-maintainers:
    - chaen
    - davidbrochart
